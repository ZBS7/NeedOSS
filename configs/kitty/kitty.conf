# NeetOs Kitty Terminal Configuration
# Cyberpunk Theme

#: Fonts
font_family      JetBrains Mono
bold_font        JetBrains Mono Bold
italic_font      JetBrains Mono Italic
bold_italic_font JetBrains Mono Bold Italic
font_size 12.0

#: Cursor
cursor_shape beam
cursor_beam_thickness 1.5
cursor_blink_interval 0.5

#: Mouse
mouse_hide_wait 3.0
url_color #00ccff
url_style curly

#: Window
remember_window_size  yes
initial_window_width  1200
initial_window_height 700
window_padding_width 12
background_opacity 0.92
background_blur 20

#: Tab bar
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style round

#: Color scheme - Cyberpunk
foreground #e0e0e0
background #0a0a0f
selection_foreground #000000
selection_background #00ff99

# Black
color0 #1a1a1f
color8 #2a2a2f

# Red
color1 #ff0099
color9 #ff33aa

# Green
color2  #00ff99
color10 #33ffaa

# Yellow
color3  #ffaa00
color11 #ffcc33

# Blue
color4  #00ccff
color12 #33ddff

# Magenta
color5  #ff00ff
color13 #ff33ff

# Cyan
color6  #00ffff
color14 #33ffff

# White
color7  #e0e0e0
color15 #ffffff

#: Advanced
shell zsh
editor nvim
allow_remote_control yes
